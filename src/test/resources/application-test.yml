spring:
  datasource:
    url: jdbc:h2:mem:echo_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  task:
    scheduling:
      enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-testing-only-not-for-production
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 2592000
  ai:
    provider: openai
    openai:
      api-key: test-key
      transcribe-model: whisper-1
      analysis-model: gpt-4o-mini
      coach-model: gpt-4o-mini
    gemini:
      api-key: test-key
      analysis-model: gemini-2.5-flash
      coach-model: gemini-2.5-flash
    claude:
      api-key: test-key
      analysis-model: claude-haiku-4-5-20251001
      coach-model: claude-haiku-4-5-20251001
  storage:
    type: local
    local-images-path: /tmp/echo-test
  resend:
    enabled: false
