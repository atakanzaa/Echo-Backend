# ── Dev Profile ────────────────────────────────────────────────────────────────
# Local development on Mac. Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev

spring:
  datasource:
    url:      jdbc:postgresql://localhost:5432/echo_db
    username: postgres
    password: postgres

app:
  jwt:
    access-token-expiry-seconds:  86400    # 24 hours — no need to keep re-logging in dev
    refresh-token-expiry-seconds: 2592000  # 30 days

  storage:
    type: local

  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"

logging:
  level:
    root: INFO
    com.echo: INFO
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
    org.flywaydb: WARN
