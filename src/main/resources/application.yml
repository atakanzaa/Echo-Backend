spring:
  application:
    name: echo-backend

  threads:
    virtual:
      enabled: true  # Java 21 — tüm Tomcat request handler'ları virtual thread'de çalışır

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  datasource:
    url:      ${DATABASE_URL:jdbc:postgresql://localhost:5432/echo_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: ${MAX_AUDIO_SIZE:50MB}
      max-request-size: ${MAX_AUDIO_SIZE:50MB}

app:
  jwt:
    secret:                       ${JWT_SECRET}  # Zorunlu — default yok. Başlatma başarısız olur.
    access-token-expiry-seconds:  ${JWT_ACCESS_EXPIRY:900}
    refresh-token-expiry-seconds: ${JWT_REFRESH_EXPIRY:2592000}

  ai:
    provider: ${AI_PROVIDER:gemini}
    fallback-provider: ${AI_FALLBACK_PROVIDER:}
    timeout-seconds: ${AI_TIMEOUT:60}
    openai:
      api-key:          ${OPENAI_API_KEY:}
      transcribe-model: ${OPENAI_TRANSCRIBE_MODEL:whisper-1}
      analysis-model:   ${OPENAI_ANALYSIS_MODEL:gpt-4o-mini}
      coach-model:      ${OPENAI_COACH_MODEL:gpt-4o-mini}
    gemini:
      api-key:          ${GEMINI_API_KEY:}
      analysis-model:   ${GEMINI_ANALYSIS_MODEL:gemini-2.5-flash}
      coach-model:      ${GEMINI_COACH_MODEL:gemini-2.5-flash}
      transcribe-model: ${GEMINI_TRANSCRIBE_MODEL:gemini-2.5-flash}
    claude:
      api-key:          ${CLAUDE_API_KEY:}
      analysis-model:   ${CLAUDE_ANALYSIS_MODEL:claude-haiku-4-5-20251001}
      coach-model:      ${CLAUDE_COACH_MODEL:claude-haiku-4-5-20251001}

  storage:
    type:       ${STORAGE_TYPE:local}
    local-path: ${LOCAL_STORAGE_PATH:/tmp/echo-audio}

  prompts:
    analysis-version:      ${PROMPT_ANALYSIS_VERSION:analysis-v4}
    coach-version:         ${PROMPT_COACH_VERSION:coach-v5}
    synthesis-version:     ${PROMPT_SYNTHESIS_VERSION:synthesis-v2}
    transcription-version: ${PROMPT_TRANSCRIPTION_VERSION:transcription-v1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

resilience4j:
  circuitbreaker:
    instances:
      # Analysis: background job, more tolerant of slowness
      gemini-analysis:
        sliding-window-size: 20
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 30s
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      # Coach: user is waiting — fail faster
      gemini-coach:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 12s
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      # Synthesis: heaviest op, longest allowed duration
      gemini-synthesis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 45s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      # Transcription: audio upload — medium tolerance
      gemini-transcription:
        sliding-window-size: 15
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 20s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      # OpenAI: same thresholds as Gemini equivalents
      openai-coach:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 12s
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      openai-analysis:
        sliding-window-size: 20
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 25s
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      openai-synthesis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 40s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      openai-transcription:
        sliding-window-size: 15
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 22s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      # Claude
      claude-coach:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 12s
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      claude-analysis:
        sliding-window-size: 20
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 25s
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
