# ── Shared Configuration ───────────────────────────────────────────────────────
# Profile-specific overrides: application-dev.yml, application-prod.yml
# Activate with: spring.profiles.active=dev|prod

spring:
  application:
    name: echo-backend

  threads:
    virtual:
      enabled: true

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  datasource:
    url:      ${DATABASE_URL:jdbc:postgresql://localhost:5432/echo_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET}

  ai:
    provider: ${AI_PROVIDER:gemini}
    fallback-provider: ${AI_FALLBACK_PROVIDER:}
    transcription-provider: ${AI_TRANSCRIPTION_PROVIDER:}
    transcription-fallback-provider: ${AI_TRANSCRIPTION_FALLBACK_PROVIDER:}
    timeout-seconds: ${AI_TIMEOUT:60}
    openai:
      api-key:          ${OPENAI_API_KEY:}
      transcribe-model: ${OPENAI_TRANSCRIBE_MODEL:whisper-1}
      analysis-model:   ${OPENAI_ANALYSIS_MODEL:gpt-4o-mini}
      coach-model:      ${OPENAI_COACH_MODEL:gpt-4o-mini}
    gemini:
      api-key:          ${GEMINI_API_KEY:}
      analysis-model:   ${GEMINI_ANALYSIS_MODEL:gemini-2.5-flash}
      coach-model:      ${GEMINI_COACH_MODEL:gemini-2.5-flash}
      transcribe-model: ${GEMINI_TRANSCRIBE_MODEL:gemini-2.5-flash}
    claude:
      api-key:          ${CLAUDE_API_KEY:}
      analysis-model:   ${CLAUDE_ANALYSIS_MODEL:claude-haiku-4-5-20251001}
      coach-model:      ${CLAUDE_COACH_MODEL:claude-haiku-4-5-20251001}

  storage:
    type:                   ${STORAGE_TYPE:local}
    local-images-path:      ${LOCAL_IMAGES_PATH:${user.home}/echo-uploads/images}
    s3-endpoint:            ${R2_ENDPOINT:}
    s3-access-key:          ${R2_ACCESS_KEY:}
    s3-secret-key:          ${R2_SECRET_KEY:}
    s3-region:              ${R2_REGION:auto}
    images-bucket:          ${R2_IMAGES_BUCKET:echo-community-images}
    images-public-base-url: ${R2_IMAGES_PUBLIC_URL:}

  apple:
    bundle-id: ${APPLE_BUNDLE_ID:}
    issuer-id: ${APPLE_ISSUER_ID:}
    key-id: ${APPLE_KEY_ID:}
    key-path: ${APPLE_KEY_PATH:}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  dlq:
    max-attempts: ${DLQ_MAX_ATTEMPTS:5}
    base-backoff-minutes: ${DLQ_BASE_BACKOFF_MINUTES:5}
    max-backoff-minutes: ${DLQ_MAX_BACKOFF_MINUTES:240}

  resend:
    api-key: ${RESEND_API_KEY:}
    webhook-secret: ${RESEND_WEBHOOK_SECRET:}
    from-address: ${RESEND_FROM_ADDRESS:no-reply@echojournal.net}
    from-name: ${RESEND_FROM_NAME:Echo Journal}
    reply-to-address: ${RESEND_REPLY_TO_ADDRESS:}
    support-address: ${RESEND_SUPPORT_ADDRESS:support@echojournal.net}
    enabled: ${RESEND_ENABLED:false}

  prompts:
    analysis-version:      ${PROMPT_ANALYSIS_VERSION:analysis-v4}
    coach-version:         ${PROMPT_COACH_VERSION:coach-v5}
    synthesis-version:     ${PROMPT_SYNTHESIS_VERSION:synthesis-v2}
    transcription-version: ${PROMPT_TRANSCRIPTION_VERSION:transcription-v1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    enabled: false   # prod profile re-enables when OTEL_EXPORTER_OTLP_ENDPOINT is set

resilience4j:
  circuitbreaker:
    instances:
      gemini-analysis:
        sliding-window-size: 20
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 30s
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      gemini-coach:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 12s
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      gemini-synthesis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 45s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      gemini-transcription:
        sliding-window-size: 15
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 20s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      openai-coach:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 12s
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      openai-analysis:
        sliding-window-size: 20
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 25s
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      openai-synthesis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 40s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      openai-transcription:
        sliding-window-size: 15
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 22s
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      claude-coach:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 70
        slow-call-duration-threshold: 12s
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true

      claude-analysis:
        sliding-window-size: 20
        failure-rate-threshold: 40
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 25s
        wait-duration-in-open-state: 45s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

      apple-storekit:
        sliding-window-size: 5
        failure-rate-threshold: 60
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 8s
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 1
        register-health-indicator: true

      resend-email:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 10s
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
